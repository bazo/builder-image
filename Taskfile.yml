version: "3"

vars:
    REGISTRY: ghcr.io
    IMAGE_NAME: bazo/builder-image
    IMAGE: "{{.REGISTRY}}/{{.IMAGE_NAME}}"
    GIT_SHA:
        sh: git rev-parse --short HEAD
    GIT_BRANCH:
        sh: git rev-parse --abbrev-ref HEAD
    GIT_TAG:
        sh: git describe --tags --exact-match 2>/dev/null || echo ""
    TAGS:
        sh: |
            tags="-t {{.IMAGE}}:{{.GIT_BRANCH}}-{{.GIT_SHA}}"
            if [ "{{.GIT_BRANCH}}" = "main" ]; then
              tags="$tags -t {{.IMAGE}}:latest"
            fi
            if [ -n "{{.GIT_TAG}}" ]; then
              version="{{.GIT_TAG}}"
              version="${version#v}"
              major="${version%%.*}"
              minor="${version%.*}"
              tags="$tags -t {{.IMAGE}}:${version} -t {{.IMAGE}}:${minor} -t {{.IMAGE}}:${major} -t {{.IMAGE}}:latest -t {{.IMAGE}}:{{.GIT_SHA}}"
            fi
            echo "$tags"

tasks:
    login:
        desc: Log in to GitHub Container Registry
        cmd: docker login {{.REGISTRY}} -u {{.GITHUB_USER}} --password-stdin <<<
            "{{.GITHUB_TOKEN}}"
        requires:
            vars: [ GITHUB_USER, GITHUB_TOKEN ]

    build:
        desc: Build multi-arch image
        cmd: >-
            docker buildx build --platform linux/amd64,linux/arm64
            {{.TAGS}} .

    push:
        desc: Push image to GHCR
        cmd: >-
            docker buildx build --platform linux/amd64,linux/arm64 --push
            {{.TAGS}} .

    release:
        desc: Build, and push to GHCR
        cmds:
            - task: build
            - task: push
